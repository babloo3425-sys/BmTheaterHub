<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Forgot Password | BmTheaterHub</title>

    <link
    rel="stylesheet"
    href="css/forgot-password.css">

</head>

<body>

    <div class="container">

        <div class="card">

            <h1>Forgot Password</h1>

            <p>

                Enter your registered email address.

            </p>

            <input
                type="email"
                id="email"
                placeholder="Enter Email">

            <button
                id="sendResetBtn">

                Send Reset Link

            </button>

            <p>

                <a href="login.html">

                    Back to Login

                </a>

            </p>

        </div>

    </div>

    <script src="js/toast.js"></script>
    <script src="js/forgot-password.js"></script>
</body>

</html>
