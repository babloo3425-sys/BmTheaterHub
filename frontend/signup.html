<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Signup - BmTheaterHub</title>

    <link rel="stylesheet"
          href="css/auth.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>🎭 BmTheaterHub</h1>

        <p>Create Your Account</p>

        <input
            type="text"
            id="name"
            placeholder="Full Name">

        <input
            type="email"
            id="email"
            placeholder="Email Address">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <button id="signupBtn">

            Create Account

        </button>

        <div class="auth-link">

            Already have an account?

            <a href="login.html">

                Login

            </a>

        </div>

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/signup.js"></script>

</body>
</html>
