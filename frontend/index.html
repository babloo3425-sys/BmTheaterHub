<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BmTheaterHub India</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header -->

    <header class="header">

    <div class="logo">
        🎭 BmTheaterHub
    </div>

    <button
    class="login-btn"
    id="loginBtn">

    Login

</button>


    </header>

    <!-- Hero Section -->

    <section class="hero">

        <div class="hero-content">

            <h1>
                India's Theatre & Stage Network
            </h1>

            <p>
                Discover Directors, Theatre Groups,
                Drama Artists & Stage Professionals.
            </p>

            <button
              class="join-btn"

              id="joinBtn">

                Join Now

             </button>

            </div>

    </section>

    <!-- Search -->

    <section class="search-section">

        <input
            type="text"
            placeholder="Search artists, directors, groups..."
            id="searchInput">

    </section>

    <!-- Categories -->

    <section class="categories">

        <h2>Categories</h2>

        <div class="category-grid">

            <div class="category-card">🎭 Drama Artist</div>

            <div class="category-card">🎬 Director</div>

            <div class="category-card">🎪 Theatre Group</div>

            <div class="category-card">🎨 Stage Decorator</div>

            <div class="category-card">🎛️ Sound Engineer</div>

            <div class="category-card">💡 Light Engineer</div>

            <div class="category-card">🎓 Theatre Trainer</div>

        </div>

    </section>

    <!-- Featured Profiles -->

    <section class="featured">

        <h2>Featured Profiles</h2>

        <div id="profilesContainer">

        </div>

    </section>

    <script src="js/index.js"></script>

</body>

</html>
