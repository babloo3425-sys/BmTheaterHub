<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BmTheaterHub India</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header -->

    <header class="header">

    <div class="logo">
        🎭 BmTheaterHub
    </div>

    <button
    class="login-btn"
    id="loginBtn">

    Login

</button>


    </header>

    <!-- Hero Section -->

    <section class="hero">

        <div class="hero-content">

            <h1>
                India's Theater & Stage Network
            </h1>

            <p>
                Discover Directors, Theater Groups,
                Drama Artists & Stage Professionals.
            </p>

            <button
              class="join-btn"

              id="joinBtn">

                Join Now

             </button>

            </div>

    </section>

    <!-- Search -->

    <section class="search-section">

    <input
        type="text"
        placeholder="Search artists, directors, groups..."
        id="searchInput">

    <div class="filter-bar">

        <select id="categoryFilter">

            <option value="">All Categories</option>

            <option value="Drama Artist">Drama Artist</option>

            <option value="Director">Director</option>

            <option value="Theater Group">Theater Group</option>

            <option value="Stage Decorator">Stage Decorator</option>

            <option value="Sound Engineer">Sound Engineer</option>

            <option value="Light Engineer">Light Engineer</option>

            <option value="Theater Trainer">Theater Trainer</option>

        </select>

        <select id="stateFilter">

            <option value="">All States</option>

            <option value="Andhra Pradesh">Andhra Pradesh</option>
            <option value="Arunachal Pradesh">Arunachal Pradesh</option>
            <option value="Assam">Assam</option>
            <option value="Bihar">Bihar</option>
            <option value="Chhattisgarh">Chhattisgarh</option>
            <option value="Goa">Goa</option>
            <option value="Gujarat">Gujarat</option>
            <option value="Haryana">Haryana</option>
            <option value="Himachal Pradesh">Himachal Pradesh</option>
            <option value="Jharkhand">Jharkhand</option>
            <option value="Karnataka">Karnataka</option>
            <option value="Kerala">Kerala</option>
            <option value="Madhya Pradesh">Madhya Pradesh</option>
            <option value="Maharashtra">Maharashtra</option>
            <option value="Manipur">Manipur</option>
            <option value="Meghalaya">Meghalaya</option>
            <option value="Mizoram">Mizoram</option>
            <option value="Nagaland">Nagaland</option>
            <option value="Odisha">Odisha</option>
            <option value="Punjab">Punjab</option>
            <option value="Rajasthan">Rajasthan</option>
            <option value="Sikkim">Sikkim</option>
            <option value="Tamil Nadu">Tamil Nadu</option>
            <option value="Telangana">Telangana</option>
            <option value="Tripura">Tripura</option>
            <option value="Uttar Pradesh">Uttar Pradesh</option>
            <option value="Uttarakhand">Uttarakhand</option>
            <option value="West Bengal">West Bengal</option>

            <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
            <option value="Chandigarh">Chandigarh</option>
            <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and Diu</option>
            <option value="Delhi">Delhi</option>
            <option value="Jammu and Kashmir">Jammu and Kashmir</option>
            <option value="Ladakh">Ladakh</option>
            <option value="Lakshadweep">Lakshadweep</option>
            <option value="Puducherry">Puducherry</option>

        </select>

    </div>

</section>

<!-- Categories -->

    <section class="categories">

        <h2>Categories</h2>

    <div class="category-grid">

    <div class="category-card" data-category="Drama Artist">
        🎭 Drama Artist
    </div>

    <div class="category-card" data-category="Director">
        🎬 Director
    </div>

    <div class="category-card" data-category="Theater Group">
        🎪 Theater Group
    </div>

    <div class="category-card" data-category="Stage Decorator">
        🎨 Stage Decorator
    </div>

    <div class="category-card" data-category="Sound Engineer">
        🎛️ Sound Engineer
    </div>

    <div class="category-card" data-category="Light Engineer">
        💡 Light Engineer
    </div>

    <div class="category-card" data-category="Theater Trainer">
        🎓 Theater Trainer
    </div>

</div>

    </section>

    <!-- Featured Profiles -->

    <section class="featured">

    <h2>Featured Profiles</h2>

    <div id="profilesContainer">

    </div>

    <div class="view-all-wrapper">

        <button id="viewAllArtistsBtn">

            View All Artists

        </button>

    </div>

</section>

<script src="js/index.js"></script>

</body>

</html>
