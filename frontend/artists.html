<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>All Artists | BmTheaterHub</title>

    <link
        rel="stylesheet"
        href="css/style.css">

    <link
        rel="stylesheet"
        href="css/artists.css">

</head>

<body>

    <!-- Header -->

    <header>

        <div class="logo">

            BM TheaterHub

        </div>

        <nav>

            <a href="index.html">

                Home

            </a>

        </nav>

    </header>

    <!-- Page Title -->

    <section class="artists-hero">

        <h1>

            All Artists

        </h1>

        <p>

            Discover talented theater professionals across India.

        </p>

    </section>

    <!-- Search & Filters -->

    <section class="artists-filter">

        <input

            type="text"

            id="searchInput"

            placeholder="Search artists...">

        <div class="filter-bar">

            <select id="categoryFilter">

                <option value="">

                    All Categories

                </option>

                <option value="Drama Artist">

                    Drama Artist

                </option>

                <option value="Director">

                    Director

                </option>

                <option value="Theater Group">

                    Theater Group

                </option>

                <option value="Stage Decorator">

                    Stage Decorator

                </option>

                <option value="Sound Engineer">

                    Sound Engineer

                </option>

                <option value="Light Engineer">

                    Light Engineer

                </option>

                <option value="Theater Trainer">

                    Theater Trainer

                </option>

            </select>

            <select id="stateFilter">

                <option value="">

                    All States

                </option>

            </select>

        </div>

    </section>

    <!-- Artists -->

    <section class="artists-section">

        <div id="artistsContainer">

        </div>

    </section>

    <script src="js/config.js"></script>
    <script src="js/artists.js"></script>
</body>

</html>
