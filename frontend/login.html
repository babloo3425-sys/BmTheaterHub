<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BmTheaterHub</title>

    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>🎭 BmTheaterHub</h1>

            <p>Welcome Back</p>

            <input
                type="email"
                id="email"
                placeholder="Email Address">

            <input
                type="password"
                id="password"
                placeholder="Password">

            <button id="loginBtn">
                Login
            </button>

            <div class="auth-link">
                Don't have an account?
                <a href="signup.html">Sign Up</a>
            </div>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>
</html>
