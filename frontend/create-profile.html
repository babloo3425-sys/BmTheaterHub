<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Profile - BmTheaterHub</title>

    <link rel="stylesheet"
          href="css/profile.css">

</head>

<body>

<div class="container">

    <div class="profile-card">

        <h1 id="pageTitle">Create Your Profile</h1>

        <p id="pageSubtitle">
            Complete your theater profile
        </p>

        <input
            type="text"
            id="name"
            placeholder="Full Name">

        <select id="profileType">

            <option value="">
                Select Profile Type
            </option>

            <option>
                Drama Artist
            </option>

            <option>
                Director
            </option>

            <option>
                Theatre Group
            </option>

            <option>
                Stage Decorator
            </option>

            <option>
                Sound Engineer
            </option>

            <option>
                Light Engineer
            </option>

            <option>
                Theatre Trainer
            </option>

        </select>

        <input
            type="text"
            id="city"
            placeholder="City">

        <input
            type="text"
            id="state"
            placeholder="State">

        <input
            type="text"
            id="experience"
            placeholder="Experience">

        <textarea
            id="about"
            placeholder="About Yourself"></textarea>

        <input
            type="text"
            id="whatsapp"
            placeholder="WhatsApp Number">

        <button
            id="createBtn">

            Create Profile

        </button>

    </div>

</div>

<script src="js/create-profile.js"></script>

</body>
</html>
