<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Public Profile | BmTheaterHub</title>

    <link rel="stylesheet" href="css/public.css">

</head>

<body>

<div class="public-profile">

    <div class="profile-card">

        <div class="profile-header">

            <div class="profile-image">

                <img
                    id="profileImage"
                    src="images/default-avatar.png"
                    alt="Profile">

            </div>

            <div class="profile-details">

                <h1 id="name">Loading...</h1>

                <div class="badge-row">

    <span
        id="featuredBadge"
        class="badge featured-badge">

        ⭐ Featured Artist

    </span>

    <span
        id="verifiedBadge"
        class="badge verified-badge">

        ✅ Verified

    </span>

</div>

                <div class="info" id="profileType">
                    🎭 Drama Artist
                </div>

                <div class="info" id="city">
                    📍 Patna
                </div>

                <div class="info" id="experience">
                    ⭐ 10 Years
                </div>

                <div class="about-box">

                  <h3>About Artist</h3>

               <p id="about">

                   Loading...

                 </p>

            <!-- =========================================
                Artist Portfolio
            ========================================= -->

            <h2 class="portfolio-title">

                   Artist Portfolio

                </h2>     


            <div class="portfolio-section">

            <button
                id="viewResumeBtn"
                class="portfolio-btn"
                style="display:none;">

                  📄 View Resume

            </button>

            <button
                id="viewPerformanceBtn"
                class="portfolio-btn"
                style="display:none;">

                ▶ Watch Performance Video

            </button>

            </div>

        </div>

            <div class="action-buttons">

              <a
                 id="whatsappBtn"
                 class="action-btn whatsapp-btn"
                 target="_blank">

                   💬 WhatsApp

              </a>

                <button
                    id="shareProfileBtn"
                    class="action-btn">

                    📤 Share Profile

                </button>

                <button
                    id="copyLinkBtn"
                    class="action-btn">

                     🔗 Copy Link

                </button>

               </div>
 
            </div>

        </div>

    </div>

</div>

<script src="js/profile.js"></script>
</body>

</html>
