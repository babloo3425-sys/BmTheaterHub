<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Public Profile | BmTheaterHub</title>

    <link rel="stylesheet" href="css/public.css">

</head>

<body>

<div class="public-profile">

    <div class="profile-card">

        <div class="profile-header">

            <div class="profile-image">

                <img
                    id="profileImage"
                    src="images/default-avatar.png"
                    alt="Profile">

            </div>

            <div class="profile-details">

                <h1 id="name">Loading...</h1>

                <div class="info" id="verified">
                    ⭐ Verified
                </div>

                <div class="info" id="profileType">
                    🎭 Drama Artist
                </div>

                <div class="info" id="city">
                    📍 Patna
                </div>

                <div class="info" id="experience">
                    ⭐ 10 Years
                </div>

                <div class="about" id="about">
                    About...
                </div>

                <a
                    id="whatsappBtn"
                    class="whatsapp-btn"
                    target="_blank">

                    💬 WhatsApp

                </a>

            </div>

        </div>

    </div>

</div>

<script src="js/profile.js"></script>
</body>

</html>
