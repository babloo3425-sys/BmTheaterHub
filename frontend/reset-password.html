<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Reset Password | BmTheaterHub</title>

    <link
        rel="stylesheet"
        href="css/auth.css">

</head>

<body>

    <div class="auth-card">

        <h1>Reset Password</h1>

        <p>

            Enter your new password.

        </p>

        <input
            type="password"
            id="newPassword"
            placeholder="New Password">

        <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password">

        <button
            id="resetPasswordBtn">

            Reset Password

        </button>

    </div>

    <script src="js/toast.js"></script>

    <script src="js/reset-password.js"></script>

</body>

</html>
