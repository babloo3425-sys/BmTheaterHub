<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BmTheaterHub</title>

    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <header class="topbar">

        <h2>🎭 BmTheaterHub</h2>

    <button

       id="adminPanelBtn"
       style="display:none;">

       🛡️ Admin Panel

</button>

        <button id="logoutBtn">
            Logout
        </button>

    </header>

    <div class="dashboard-container">

        <div class="profile-card">

        <div class="profile-header">

        <div class="profile-photo">

    <img
        id="profileImage"
        src="images/default-avatar.png"
        alt="Profile">

    <button id="changePhotoBtn">
        📷
    </button>

    </div>

<input
    type="file"
    id="profileImageInput"
    accept="image/*"
    hidden>       

    <div class="profile-info">

    <div class="name-top">

        <h1 id="name"></h1>

        <div class="profile-completion">

            <h3>Profile Completion</h3>

            <div class="progress-bar">

                <div
                    id="progressFill"
                    class="progress-fill">

                </div>

            </div>

            <p id="progressText">

                0% Complete

            </p>

        </div>

    </div>

    <div class="badge-row">

        <span id="verifiedBadge">
            ⭐ Verified
        </span>

    </div>

</div>

</div>

           <p id="profileType"></p>

           <p id="city"></p>

           <p id="whatsapp"></p>

           <p id="email"></p>

           <p id="about"></p>

           <div class="resume-section">

    <p id="resumeStatus">
        📄 Resume : Not Uploaded
    </p>

</div>

<div class="button-group">

    <button id="editProfileBtn" class="edit-btn">
        Edit Profile
    </button>

    <button id="viewProfileBtn" class="edit-btn">
        🌐 Preview Public Profile
    </button>

    <button
        id="viewResumeBtn"
        class="edit-btn"
        style="display:none;">
        📄 View Resume
    </button>

    <button id="uploadResumeBtn" class="edit-btn">
        📄 Upload Resume
    </button>

 </div>

    <input
      type="file"
      id="resumeInput"
      accept=".pdf"
      hidden>

    <div class="video-section">

    <button
        id="videoBtn"
        class="edit-btn video-btn">

        🎬 Upload Performance Video

    </button>

    <p id="videoStatus">

        🎬 Performance Video : Not Uploaded

    </p>

     </div>

    <input
      type="file"
      id="performanceVideoInput"
      accept="video/mp4,video/webm,video/quicktime"
      hidden>

      </div>

     </div>

    </div>

    <script src="js/config.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/dashboard.js"></script>
 
 </body>
 
</html>
